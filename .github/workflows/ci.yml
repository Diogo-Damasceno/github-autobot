name: CI
on:
  push:
  pull_request:
  schedule:
    - cron: '0 6 * * *'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install -e . pytest ruff
      - name: Lint
        run: ruff check github_autobot || true
      - name: Test
        run: pytest -q
